pluginManagement {
    repositories {
        maven {
            // RetroFuturaGradle
            name = "GTNH Maven"
            url = uri("https://nexus.gtnewhorizons.com/repository/public/")
            mavenContent {
                includeGroup("com.gtnewhorizons")
                includeGroupByRegex("com\\.gtnewhorizons\\..+")
            }
        }
        maven { url = uri("https://jitpack.io") }  // added here
        gradlePluginPortal()
        mavenCentral()
        mavenLocal()
    }
    resolutionStrategy {
        eachPlugin {
            if (requested.id.toString() == "dts.typescript-generator") {
                useModule("dts:dts-gradle-plugin:1.0.0")
                // useModule("com.github.bigguy345:dts-gradle-plugin:main-SNAPSHOT")
            }
        }
    }
}

plugins {
    id("com.gtnewhorizons.gtnhsettingsconvention") version("1.0.41")
}
